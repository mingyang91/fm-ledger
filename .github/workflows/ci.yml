name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: compile + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      # Coursier/Ivy dependency cache (Mill resolves deps through coursier).
      - name: Cache coursier
        uses: actions/cache@v4
        with:
          path: ~/.cache/coursier
          key: coursier-${{ hashFiles('build.mill', '.mill-version') }}
          restore-keys: coursier-

      # Transpiles the verified core, compiles the generated core + the shell, then runs the
      # endpoint specs and the differential drift gate. Testcontainers pulls postgres:16-alpine
      # via the Docker daemon that ubuntu-latest provides.
      - name: Compile
        run: ./mill compile

      - name: Test
        run: ./mill test

  verify:
    name: stainless verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache coursier
        uses: actions/cache@v4
        with:
          path: ~/.cache/coursier
          key: coursier-${{ hashFiles('build.mill', '.mill-version') }}
          restore-keys: coursier-

      # The structural VC cache: a warm run re-solves only changed verification conditions.
      # Keyed on the verified sources so an unrelated shell change reuses the whole cache.
      - name: Cache Stainless VC cache
        uses: actions/cache@v4
        with:
          path: verify/.stainless-cache
          key: stainless-vc-${{ hashFiles('verify/**/*.scala') }}
          restore-keys: stainless-vc-

      # Cache the built verifier image (Stainless + z3) as a tarball, keyed on the verify/stainless
      # build context. This skips the apt install and the hundreds-of-MB Stainless download on every
      # run; verify.scala reuses an already-loaded image instead of rebuilding it.
      - name: Cache Stainless verifier image
        uses: actions/cache@v4
        with:
          path: ~/.cache/stainless-image
          key: stainless-image-${{ hashFiles('verify/stainless/**') }}
      - name: Load cached verifier image
        run: |
          tar="$HOME/.cache/stainless-image/stainless-verify.tar"
          if [ -f "$tar" ]; then echo "loading cached stainless-verify image"; docker load -i "$tar"; fi

      # Runs the proofs over the whole verified core (Docker is available on ubuntu-latest).
      - name: Verify
        run: ./mill verify.scala

      # Persist the image on a cache miss so the next run restores it instead of rebuilding.
      - name: Save verifier image to cache
        if: always()
        run: |
          tar="$HOME/.cache/stainless-image/stainless-verify.tar"
          if [ -n "$(docker images -q stainless-verify)" ] && [ ! -f "$tar" ]; then
            mkdir -p "$HOME/.cache/stainless-image"
            docker save stainless-verify -o "$tar"
          fi
