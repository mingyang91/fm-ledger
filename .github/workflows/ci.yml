name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: compile + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      # Coursier/Ivy dependency cache (Mill resolves deps through coursier).
      - name: Cache coursier
        uses: actions/cache@v4
        with:
          path: ~/.cache/coursier
          key: coursier-${{ hashFiles('build.mill', '.mill-version') }}
          restore-keys: coursier-

      # Transpiles the verified core, compiles the generated core + the shell, then runs the
      # endpoint specs and the differential drift gate. Testcontainers pulls postgres:16-alpine
      # via the Docker daemon that ubuntu-latest provides.
      - name: Compile
        run: ./mill compile

      - name: Test
        run: ./mill test

  verify:
    name: stainless verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache coursier
        uses: actions/cache@v4
        with:
          path: ~/.cache/coursier
          key: coursier-${{ hashFiles('build.mill', '.mill-version') }}
          restore-keys: coursier-

      # The structural VC cache: a warm run re-solves only changed verification conditions.
      # Keyed on the verified sources so an unrelated shell change reuses the whole cache.
      - name: Cache Stainless VC cache
        uses: actions/cache@v4
        with:
          path: verify/.stainless-cache
          key: stainless-${{ hashFiles('verify/**/*.scala') }}
          restore-keys: stainless-

      # Builds the Stainless verifier image from verify/stainless/ and runs the proofs over the
      # whole verified core (Docker is available on ubuntu-latest).
      - name: Verify
        run: ./mill verify.scala
